name: eth-deposit-gen

on: push

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: go/cmd/eth-deposit-gen

    env:
      CGO_ENABLED: 1
      GOFLAGS: -mod=readonly

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Verify module checksums
        run: go mod verify

      - name: Vet
        run: go vet ./...

      - name: Staticcheck
        run: staticcheck ./...

      - name: Test
        run: go test ./...
