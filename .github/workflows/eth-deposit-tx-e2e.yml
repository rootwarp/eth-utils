name: eth-deposit-tx e2e

on:
  push:
    branches: [develop, main, "feature/eth-deposit-tx*"]
  pull_request:
    branches: [develop, main]

jobs:
  e2e-mock:
    name: E2E mock (no RPC)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: go

    env:
      CGO_ENABLED: 1
      GOFLAGS: -mod=readonly

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Install staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Verify module checksums
        run: go mod verify

      - name: Test (unit + integration)
        run: make test

      - name: Lint
        run: make lint

      - name: E2E mock (build+sign+send via mock broadcaster, no real RPC)
        run: make e2e-mock
