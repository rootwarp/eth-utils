name: release

on:
  push:
    tags:
      - "v*"

jobs:
  # ── eth-deposit-gen test jobs ────────────────────────────────────────────
  test-linux-amd64:
    name: Test eth-deposit-gen (linux/amd64)
    runs-on: ubuntu-latest

    permissions:
      contents: read

    defaults:
      run:
        working-directory: go/cmd/eth-deposit-gen

    env:
      CGO_ENABLED: "1"
      GOFLAGS: -mod=readonly

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Verify module checksums
        run: go mod verify

      - name: Vet
        run: go vet ./...

      - name: Staticcheck
        run: staticcheck ./...

      - name: Test
        run: go test ./...

  test-linux-arm64:
    name: Test eth-deposit-gen (linux/arm64)
    # ubuntu-24.04-arm is a GitHub-hosted native ARM runner available for
    # public repositories. If this runner is unavailable on your plan, replace
    # with ubuntu-latest and add the docker/setup-qemu-action@v3 step plus
    # run tests inside an arm64 QEMU container (see QEMU fallback comment below).
    runs-on: ubuntu-24.04-arm

    permissions:
      contents: read

    defaults:
      run:
        working-directory: go/cmd/eth-deposit-gen

    env:
      CGO_ENABLED: "1"
      GOFLAGS: -mod=readonly

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Verify module checksums
        run: go mod verify

      - name: Vet
        run: go vet ./...

      - name: Staticcheck
        run: staticcheck ./...

      - name: Test
        run: go test ./...

    # QEMU fallback: if ubuntu-24.04-arm is unavailable, replace the job above
    # with this pattern on ubuntu-latest:
    #
    # - name: Set up QEMU
    #   uses: docker/setup-qemu-action@v3
    #   with:
    #     platforms: arm64
    #
    # - name: Test (arm64 via QEMU)
    #   uses: addnab/docker-run-action@v3
    #   with:
    #     image: golang:1.25
    #     options: --platform linux/arm64 -v ${{ github.workspace }}:/workspace -w /workspace/go/cmd/eth-deposit-gen -e CGO_ENABLED=1
    #     run: |
    #       go mod verify
    #       go vet ./...
    #       go test ./...

  test-darwin-arm64:
    name: Test eth-deposit-gen (darwin/arm64)
    runs-on: macos-14

    permissions:
      contents: read

    defaults:
      run:
        working-directory: go/cmd/eth-deposit-gen

    env:
      CGO_ENABLED: "1"
      GOFLAGS: -mod=readonly

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Verify module checksums
        run: go mod verify

      - name: Vet
        run: go vet ./...

      - name: Staticcheck
        run: staticcheck ./...

      - name: Test
        run: go test ./...

  # ── eth-deposit-tx test jobs ─────────────────────────────────────────────
  test-tx-linux-amd64:
    name: Test eth-deposit-tx (linux/amd64)
    runs-on: ubuntu-latest

    permissions:
      contents: read

    defaults:
      run:
        working-directory: go/cmd/eth-deposit-tx

    env:
      CGO_ENABLED: "1"
      GOFLAGS: -mod=readonly

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Verify module checksums
        run: go mod verify

      - name: Vet
        run: go vet ./...

      - name: Staticcheck
        run: staticcheck ./...

      - name: Test
        run: go test ./...

      - name: E2E mock
        run: go test -tags=e2e -count=1 ./...

  test-tx-linux-arm64:
    name: Test eth-deposit-tx (linux/arm64)
    runs-on: ubuntu-24.04-arm

    permissions:
      contents: read

    defaults:
      run:
        working-directory: go/cmd/eth-deposit-tx

    env:
      CGO_ENABLED: "1"
      GOFLAGS: -mod=readonly

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Verify module checksums
        run: go mod verify

      - name: Vet
        run: go vet ./...

      - name: Staticcheck
        run: staticcheck ./...

      - name: Test
        run: go test ./...

      - name: E2E mock
        run: go test -tags=e2e -count=1 ./...

  test-tx-darwin-arm64:
    name: Test eth-deposit-tx (darwin/arm64)
    runs-on: macos-14

    permissions:
      contents: read

    defaults:
      run:
        working-directory: go/cmd/eth-deposit-tx

    env:
      CGO_ENABLED: "1"
      GOFLAGS: -mod=readonly

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Verify module checksums
        run: go mod verify

      - name: Vet
        run: go vet ./...

      - name: Staticcheck
        run: staticcheck ./...

      - name: Test
        run: go test ./...

      - name: E2E mock
        run: go test -tags=e2e -count=1 ./...

  # ── GoReleaser build (both binaries) ─────────────────────────────────────
  goreleaser:
    name: GoReleaser
    needs:
      - test-linux-amd64
      - test-linux-arm64
      - test-darwin-arm64
      - test-tx-linux-amd64
      - test-tx-linux-arm64
      - test-tx-darwin-arm64
    runs-on: ubuntu-latest

    permissions:
      contents: write

    # goreleaser-cross:v1.25.9 bundles Go 1.25 and cross-compilation toolchains:
    #   linux/amd64:  x86_64-linux-gnu-gcc
    #   linux/arm64:  aarch64-linux-gnu-gcc
    #   darwin/amd64: o64-clang   (osxcross)
    #   darwin/arm64: oa64-clang  (osxcross)
    # The goreleaser binary inside the container is used directly (no
    # goreleaser-action) to avoid shadowing the pinned version with a floating
    # "latest" download.
    container:
      image: ghcr.io/goreleaser/goreleaser-cross:v1.25.9

    env:
      CGO_ENABLED: "1"
      GOFLAGS: -mod=readonly
      # Cross-compiler env vars read by .goreleaser.yaml build configs.
      CC_FOR_LINUX_AMD64: x86_64-linux-gnu-gcc
      CC_FOR_LINUX_ARM64: aarch64-linux-gnu-gcc
      CC_FOR_DARWIN_AMD64: o64-clang
      CC_FOR_DARWIN_ARM64: oa64-clang

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # The goreleaser-cross container runs goreleaser as a different UID than
      # the one that owns the workspace files (host runner user). Git refuses
      # to operate on a repo it considers "owned by someone else", so the
      # "getting and validating git state" step fails with
      # "current folder is not a git repository". Marking the workspace as
      # safe.directory bypasses the ownership check inside the container.
      - name: Mark workspace as a safe git directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      # anchore/sbom-action's install-syft helper invokes unzip during setup,
      # which the goreleaser-cross container does not ship by default.
      - name: Install unzip (required by anchore/sbom-action)
        run: |
          apt-get update
          apt-get install -y --no-install-recommends unzip

      - name: Run GoReleaser
        run: goreleaser release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # anchore/sbom-action passes `path:` to syft with a `dir:` prefix, so the
      # target must be a directory (not the .tar.gz archive). Goreleaser leaves
      # the extracted binary in `dist/<build-id>_<goos>_<goarch>_<variant>/`
      # before archiving, so we point syft at that directory. Syft's binary
      # cataloger extracts the Go module list from the compiled binary.

      # ── eth-deposit-gen SBOMs ─────────────────────────────────────────────
      - name: Generate SBOM — eth-deposit-gen (linux/amd64)
        uses: anchore/sbom-action@v0
        with:
          path: dist/linux-amd64_linux_amd64_v1
          artifact-name: eth-deposit-gen_linux_amd64.sbom.spdx.json
          format: spdx-json
          upload-release-assets: true

      - name: Generate SBOM — eth-deposit-gen (linux/arm64)
        uses: anchore/sbom-action@v0
        with:
          path: dist/linux-arm64_linux_arm64_v8.0
          artifact-name: eth-deposit-gen_linux_arm64.sbom.spdx.json
          format: spdx-json
          upload-release-assets: true

      - name: Generate SBOM — eth-deposit-gen (darwin/amd64)
        uses: anchore/sbom-action@v0
        with:
          path: dist/darwin-amd64_darwin_amd64_v1
          artifact-name: eth-deposit-gen_darwin_amd64.sbom.spdx.json
          format: spdx-json
          upload-release-assets: true

      - name: Generate SBOM — eth-deposit-gen (darwin/arm64)
        uses: anchore/sbom-action@v0
        with:
          path: dist/darwin-arm64_darwin_arm64_v8.0
          artifact-name: eth-deposit-gen_darwin_arm64.sbom.spdx.json
          format: spdx-json
          upload-release-assets: true

      # ── eth-deposit-tx SBOMs ──────────────────────────────────────────────
      - name: Generate SBOM — eth-deposit-tx (linux/amd64)
        uses: anchore/sbom-action@v0
        with:
          path: dist/tx-linux-amd64_linux_amd64_v1
          artifact-name: eth-deposit-tx_linux_amd64.sbom.spdx.json
          format: spdx-json
          upload-release-assets: true

      - name: Generate SBOM — eth-deposit-tx (linux/arm64)
        uses: anchore/sbom-action@v0
        with:
          path: dist/tx-linux-arm64_linux_arm64_v8.0
          artifact-name: eth-deposit-tx_linux_arm64.sbom.spdx.json
          format: spdx-json
          upload-release-assets: true

      - name: Generate SBOM — eth-deposit-tx (darwin/amd64)
        uses: anchore/sbom-action@v0
        with:
          path: dist/tx-darwin-amd64_darwin_amd64_v1
          artifact-name: eth-deposit-tx_darwin_amd64.sbom.spdx.json
          format: spdx-json
          upload-release-assets: true

      - name: Generate SBOM — eth-deposit-tx (darwin/arm64)
        uses: anchore/sbom-action@v0
        with:
          path: dist/tx-darwin-arm64_darwin_arm64_v8.0
          artifact-name: eth-deposit-tx_darwin_arm64.sbom.spdx.json
          format: spdx-json
          upload-release-assets: true
